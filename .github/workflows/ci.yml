name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint --if-present || echo "Lint script not found, skipping..."
      
      - name: Build session-management library
        run: npm run build
      
      - name: Build demo app
        run: npm run build:demo -- --configuration production
      
      - name: Security audit
        run: npm audit --audit-level=moderate || echo "Security audit found issues, please review"
        continue-on-error: true

