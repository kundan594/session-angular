name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build session-management library
        run: npm run build --if-present || ng build session-management
      
      - name: Build demo app for production
        run: npm run build:demo --if-present || ng build demo-app --configuration production --base-href /session-angular/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: List build output (debug)
        run: |
          echo "Listing dist directory:"
          ls -la dist/ || echo "dist not found"
          echo "Listing dist/demo-app:"
          ls -la dist/demo-app/ || echo "dist/demo-app not found"
          echo "Checking for browser folder:"
          ls -la dist/demo-app/browser/ || echo "browser folder not found"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/demo-app'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

