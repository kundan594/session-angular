name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build session-management library
        run: npm run build
      
      - name: Build demo app for production
        run: npx ng build demo-app --configuration production --base-href=/session-angular/
      
      - name: List build output
        run: |
          echo "=== Checking build output ==="
          ls -la dist/
          echo "=== Checking demo-app folder ==="
          ls -la dist/demo-app/
          echo "=== Checking browser folder ==="
          if [ -d "dist/demo-app/browser" ]; then
            ls -la dist/demo-app/browser/
            echo "=== Files in browser folder ==="
            find dist/demo-app/browser -type f
          else
            echo "browser folder not found"
            echo "=== Files in demo-app folder ==="
            find dist/demo-app -type f
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/demo-app/browser'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

